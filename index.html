<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MBTI 人格测试</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#05050a;color:#ececf0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;opacity:0;pointer-events:none;transform:translateY(30px);transition:opacity .5s cubic-bezier(.23,1,.32,1),transform .5s cubic-bezier(.23,1,.32,1)}
.screen.active{opacity:1;pointer-events:auto;transform:translateY(0)}
.screen.hide-up{opacity:0;transform:translateY(-60px)}
.screen.hide-down{opacity:0;transform:translateY(60px)}
.intro-logo{width:100px;height:100px;border-radius:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#d946ef);display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:28px;box-shadow:0 24px 60px rgba(99,102,241,.4);animation:flt 3s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.intro-title{font-size:40px;font-weight:800;letter-spacing:-1px;text-align:center;line-height:1.15;margin-bottom:8px;background:linear-gradient(180deg,#f0f0f8,#a0a0c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.intro-sub{font-size:15px;color:#6a6a90;text-align:center;margin-bottom:44px;line-height:1.6}
.intro-btn{width:220px;height:56px;border-radius:28px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:transform .18s,box-shadow .18s;box-shadow:0 8px 32px rgba(99,102,241,.35)}
.intro-btn:active{transform:scale(.94);box-shadow:0 4px 16px rgba(99,102,241,.5)}
.progress-wrap{position:relative;width:130px;height:130px;margin-bottom:36px}
.progress-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
.progress-wrap .bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:3}
.progress-wrap .fg{fill:none;stroke:url(#pg);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .45s cubic-bezier(.23,1,.32,1)}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700}
.q-card{width:100%;max-width:480px;background:rgba(255,255,255,.035);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);border-radius:24px;border:1px solid rgba(255,255,255,.07);padding:32px 24px;position:relative;overflow:hidden;transition:transform .35s cubic-bezier(.23,1,.32,1),opacity .25s ease}
.q-card::before{content:''';position:absolute;inset:0;border-radius:24px;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.06),transparent 70%);pointer-events:none}
.q-card.swiping{transition:none}
.q-dim{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#7a7aa0;margin-bottom:14px}
.q-text{font-size:21px;font-weight:700;line-height:1.35;margin-bottom:6px}
.q-hint{font-size:12px;color:#5a5a80;margin-bottom:28px}
.q-opts{display:flex;flex-direction:column;gap:10px}
.q-opt{width:100%;padding:15px 18px;border-radius:14px;border:1.5px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);color:#b8b8d8;font-size:14px;text-align:left;cursor:pointer;transition:all .2s cubic-bezier(.23,1,.32,1);position:relative;overflow:hidden}
.q-opt:active{transform:scale(.965)}
.q-opt.picked{border-color:#6366f1;background:rgba(99,102,241,.1);color:#fff;box-shadow:0 0 28px rgba(99,102,241,.12)}
.q-opt.picked::after{content:''';position:absolute;left:0;top:0;bottom:0;width:3px;background:#6366f1;border-radius:0 3px 3px 0}
.swipe-zone{position:absolute;inset:0;z-index:5}
.swipe-hint{display:flex;align-items:center;gap:8px;margin-top:24px;color:#4a4a6a;font-size:12px;animation:shp 2s ease-in-out infinite}
@keyframes shp{0%,100%{opacity:.3}50%{opacity:.8}}
#camera-screen{z-index:8}
.cam-wrap{width:100%;max-width:440px;aspect-ratio:3/4;border-radius:24px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.08);background:#000}
.cam-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.cam-wrap canvas{display:none}
.cam-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-frame-inner{border:2px solid rgba(255,255,255,.25);border-radius:50%;width:180px;height:180px;animation:cfp 2s ease-in-out infinite}
@keyframes cfp{0%,100%{border-color:rgba(255,255,255,.25);box-shadow:0 0 0 0 rgba(255,255,255,.06)}50%{border-color:rgba(255,255,255,.55);box-shadow:0 0 40px 10px rgba(99,102,241,.1)}}
.cam-label{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;font-weight:700;z-index:2;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.cam-skip{position:absolute;top:18px;right:16px;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;z-index:2;padding:6px 14px;background:rgba(0,0,0,.4);border-radius:20px;border:none}
.cam-filters{position:absolute;bottom:120px;left:0;right:0;display:flex;justify-content:center;gap:14px;z-index:2}
.cam-filter{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.2);cursor:pointer;transition:border-color .2s,transform .2s}
.cam-filter.active{border-color:#fff;transform:scale(1.2)}
.cam-filter.f1{background:transparent}
.cam-filter.f2{background:linear-gradient(135deg,rgba(99,102,241,.35),rgba(168,85,247,.25))}
.cam-filter.f3{background:rgba(128,128,128,.4);backdrop-filter:grayscale(1);-webkit-backdrop-filter:grayscale(1)}
.cam-filter.f4{background:linear-gradient(135deg,rgba(236,72,153,.3),rgba(244,114,182,.2))}
.cam-capture{width:68px;height:68px;border-radius:50%;border:4px solid #fff;background:rgba(255,255,255,.2);cursor:pointer;position:absolute;bottom:28px;left:50%;transform:translateX(-50%);transition:transform .12s,background .12s;z-index:2}
.cam-capture:active{transform:translateX(-50%) scale(.82);background:rgba(255,255,255,.45)}
.cam-capture .inner{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.9);margin:3px}
.cam-countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;color:#fff;z-index:3;pointer-events:none;text-shadow:0 4px 20px rgba(0,0,0,.5);animation:cdp .5s ease-out}
@keyframes cdp{0%{transform:scale(1.8);opacity:0}50%{opacity:1}100%{transform:scale(1);opacity:1}}
.result-badge{font-size:80px;font-weight:900;letter-spacing:-3px;margin-bottom:4px;animation:rb .8s cubic-bezier(.23,1,.32,1);background:linear-gradient(135deg,#6366f1,#8b5cf6,#d946ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@keyframes rb{0%{transform:scale(.2);opacity:0;filter:blur(30px)}60%{transform:scale(1.06);opacity:1;filter:blur(0)}100%{transform:scale(1);opacity:1}}
.result-name{font-size:19px;font-weight:700;color:#9090b8;margin-bottom:24px}
.result-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.12);margin-bottom:20px}
.result-bars{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;width:100%;max-width:440px}
.rbar-row{display:flex;align-items:center;gap:10px}
.rbar-label{font-size:12px;font-weight:700;color:#7a7aa0;width:28px;text-align:center}
.rbar-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.23,1,.32,1)}
.rbar-fill.ei{background:linear-gradient(90deg,#f59e0b,#6366f1)}
.rbar-fill.sn{background:linear-gradient(90deg,#10b981,#a855f7)}
.rbar-fill.tf{background:linear-gradient(90deg,#3b82f6,#ec4899)}
.rbar-fill.jp{background:linear-gradient(90deg,#f59e0b,#14b8a6)}
.result-card{width:100%;max-width:440px;background:rgba(255,255,255,.035);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);border-radius:20px;border:1px solid rgba(255,255,255,.07);padding:22px;margin-bottom:20px}
.result-card h3{font-size:12px;font-weight:700;letter-spacing:2px;color:#6a6a90;margin-bottom:10px;text-transform:uppercase}
.result-card p{font-size:14px;line-height:1.55;color:#a8a8c8}
.result-btns{display:flex;gap:12px}
.result-btn{flex:1;height:46px;border-radius:23px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#b0b0d0;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.result-btn:active{background:rgba(255,255,255,.1);transform:scale(.96)}
.result-btn.primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#ececf0;padding:10px 22px;border-radius:22px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid rgba(255,255,255,.08)}
.toast.show{opacity:1}
@media(min-width:768px){.intro-title{font-size:52px}.q-text{font-size:24px}.q-card{padding:40px 32px}.result-badge{font-size:100px}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="app">
  <div class="screen active" id="intro">
    <div class="intro-logo">🧠</div>
    <h1 class="intro-title">发现你的<br>人格密码</h1>
    <p class="intro-sub">30 道精选题目 · 摄像头拍照 · 手势滑动<br>解锁专属MBTI人格报告</p>
    <button class="intro-btn" id="btn-start">开始探索</button>
  </div>
  <div class="screen" id="question">
    <div class="progress-wrap">
      <svg viewBox="0 0 130 130">
        <defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
        <circle class="bg" cx="65" cy="65" r="57"/>
        <circle class="fg" id="prog-fg" cx="65" cy="65" r="57" stroke-dasharray="358.14" stroke-dashoffset="358.14"/>
      </svg>
      <div class="progress-text" id="prog-txt">1/30</div>
    </div>
    <div class="q-card" id="qcard">
      <div class="q-dim" id="qdim"></div>
      <div class="q-text" id="qtxt"></div>
      <div class="q-hint" id="qhint"></div>
      <div class="q-opts" id="qopts"></div>
    </div>
    <div class="swipe-hint">← 点击选择 → 左右滑动</div>
  </div>
  <div class="screen" id="camera">
    <div class="cam-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <canvas id="cam-canvas"></canvas>
      <div class="cam-frame"><div class="cam-frame-inner"></div></div>
      <div class="cam-label">拍一张你的 MBTI 肖像</div>
      <button class="cam-skip" id="btn-skip">跳过</button>
      <div class="cam-filters">
        <button class="cam-filter f1 active" data-flt="none"></button>
        <button class="cam-filter f2" data-flt="vivid"></button>
        <button class="cam-filter f3" data-flt="mono"></button>
        <button class="cam-filter f4" data-flt="warm"></button>
      </div>
      <button class="cam-capture" id="btn-cap"><div class="inner"></div></button>
    </div>
  </div>
  <div class="screen" id="result">
    <img class="result-photo" id="res-photo" alt="" style="display:none">
    <div class="result-badge" id="res-badge"></div>
    <div class="result-name" id="res-name"></div>
    <div class="result-bars" id="res-bars"></div>
    <div class="result-card"><h3>人格解读</h3><p id="res-desc"></p></div>
    <div class="result-btns">
      <button class="result-btn" id="btn-retry">重新测试</button>
      <button class="result-btn primary" id="btn-share">分享结果</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
var Q = [
  {id:1,d:"EI",dl:"外向 E · 内向 I",t:"周末晚上，你更想怎么过？",o:[{t:"参加派对或朋友聚会",s:"E"},{t:"独自在家看书或看电影",s:"I"}]},
  {id:2,d:"EI",dl:"外向 E · 内向 I",t:"在人群中度过一整天后，你感觉？",o:[{t:"精力充沛、意犹未尽",s:"E"},{t:"精疲力尽、需要独处",s:"I"}]},
  {id:3,d:"EI",dl:"外向 E · 内向 I",t:"遇到新问题时，你倾向于？",o:[{t:"找人讨论、边聊边想",s:"E"},{t:"自己思考、想清楚再说",s:"I"}]},
  {id:4,d:"EI",dl:"外向 E · 内向 I",t:"认识陌生人对你来说是？",o:[{t:"有趣而令人兴奋",s:"E"},{t:"需要消耗精力的事",s:"I"}]},
  {id:5,d:"EI",dl:"外向 E · 内向 I",t:"你更喜欢哪种工作方式？",o:[{t:"开放式办公室、团队协作",s:"E"},{t:"安静独立的个人空间",s:"I"}]},
  {id:6,d:"EI",dl:"外向 E · 内向 I",t:"接电话时你通常？",o:[{t:"毫不犹豫地接听",s:"E"},{t:"先看来电显示再决定",s:"I"}]},
  {id:7,d:"EI",dl:"外向 E · 内向 I",t:"旅行时你更喜欢？",o:[{t:"参加当地社交活动",s:"E"},{t:"一个人探索角落",s:"I"}]},
  {id:8,d:"SN",dl:"感觉 S · 直觉 N",t:"阅读一本书时，你更关注？",o:[{t:"具体的情节和细节描写",s:"S"},{t:"背后的主题和隐喻",s:"N"}]},
  {id:9,d:"SN",dl:"感觉 S · 直觉 N",t:"学习新技能时，你偏好？",o:[{t:"按部就班跟着教程走",s:"S"},{t:"先理解整体框架再探索",s:"N"}]},
  {id:10,d:"SN",dl:"感觉 S · 直觉 N",t:"你更相信什么？",o:[{t:"亲眼所见、亲身经历",s:"S"},{t:"直觉、灵感和第六感",s:"N"}]},
  {id:11,d:"SN",dl:"感觉 S · 直觉 N",t:"描述一件事时，你更常？",o:[{t:"给出具体的数据和事实",s:"S"},{t:"使用比喻和抽象概念",s:"N"}]},
  {id:12,d:"SN",dl:"感觉 S · 直觉 N",t:"你更容易记住？",o:[{t:"具体的画面和细节",s:"S"},{t:"整体的感觉和印象",s:"N"}]},
  {id:13,d:"SN",dl:"感觉 S · 直觉 N",t:"面对新项目，你先想到？",o:[{t:"需要哪些具体步骤",s:"S"},{t:"最终会是什么样子",s:"N"}]},
  {id:14,d:"SN",dl:"感觉 S · 直觉 N",t:"你更欣赏哪种人？",o:[{t:"脚踏实地、注重实际的人",s:"S"},{t:"天马行空、富有想象的人",s:"N"}]},
  {id:15,d:"TF",dl:"思考 T · 情感 F",t:"做重要决定时，你优先考虑？",o:[{t:"逻辑分析和客观标准",s:"T"},{t:"对相关人的影响和感受",s:"F"}]},
  {id:16,d:"TF",dl:"思考 T · 情感 F",t:"朋友向你倾诉烦恼时？",o:[{t:"帮她分析问题、给建议",s:"T"},{t:"先安抚情绪、表达理解",s:"F"}]},
  {id:17,d:"TF",dl:"思考 T · 情感 F",t:"评价一个方案时，你更看重？",o:[{t:"是否高效和可行",s:"T"},{t:"是否考虑到了每个人的需求",s:"F"}]},
  {id:18,d:"TF",dl:"思考 T · 情感 F",t:"面对批评，你更希望对方？",o:[{t:"直接指出问题所在",s:"T"},{t:"注意说话方式、顾及感受",s:"F"}]},
  {id:19,d:"TF",dl:"思考 T · 情感 F",t:"团队中出现分歧时你？",o:[{t:"坚持正确的方案据理力争",s:"T"},{t:"寻求让大家都满意的折中方案",s:"F"}]},
  {id:20,d:"TF",dl:"思考 T · 情感 F",t:"你认为更重要的是？",o:[{t:"公平公正",s:"T"},{t:"仁慈宽容",s:"F"}]},
  {id:21,d:"TF",dl:"思考 T · 情感 F",t:"看电影时你更容易被什么打动？",o:[{t:"精妙的剧情结构和逻辑",s:"T"},{t:"人物之间的情感羁绊",s:"F"}]},
  {id:22,d:"JP",dl:"判断 J · 感知 P",t:"面对周末计划，你通常？",o:[{t:"提前安排好所有行程",s:"J"},{t:"睡醒再说、随性而为",s:"P"}]},
  {id:23,d:"JP",dl:"判断 J · 感知 P",t:"截止日期对你来说是？",o:[{t:"激励我高效完成工作",s:"J"},{t:"带来压力和束缚感",s:"P"}]},
  {id:24,d:"JP",dl:"判断 J · 感知 P",t:"你的桌面通常是？",o:[{t:"整洁有序、井井有条",s:"J"},{t:"创意凌乱、但我知道东西在哪",s:"P"}]},

  {id:27,d:"JP",dl:"判断 J · 感知 P",t:"工作报告你通常？",o:[{t:"提前完成、反复修改",s:"J"},{t:"截止前冲刺、效率最高",s:"P"}]},
  {id:28,d:"JP",dl:"判断 J · 感知 P",t:"朋友约你下个月旅行，你的反应？",o:[{t:"太好了，我们现在就可以订机票酒店",s:"J"},{t:"可以啊，到时候再说细节",s:"P"}]},

  {id:30,d:"SN",dl:"感觉 S · 直觉 N",t:"装修房间时你更关注？",o:[{t:"实用功能和舒适度",s:"S"},{t:"风格美感和设计感",s:"N"}]},
];

var TYPES = {
  INTJ:{n:"建筑师",d:"你是天生的战略家，拥有深邃的内在世界。你善于把复杂的想法转化为清晰的行动路线，在独立思考和长远规划中找到力量。你对自己和他人都有着极高的标准，不为短期诱惑所动。你的座右铭是：任何值得做的事，都值得做到极致。"},
  INTP:{n:"逻辑学家",d:"你对世界有着永不满足的好奇心，享受在思想迷宫中探索的快感。你善于解构复杂问题、发现隐藏的模式，在知识的自由海洋中遨游。你不喜欢被规则束缚，更相信自己的理性判断。你的超能力是在混乱中找到逻辑。"},

  ENTP:{n:"辩论家",d:"你思维敏捷、口才出众，热衷于智力上的交锋和碰撞。你总能从多个角度看问题、找到创新的解决方案，在思想的自由驰骋中找到真正的快乐。你不喜欢墨守成规，更享受打破边界的过程。"},
  INFJ:{n:"提倡者",d:"你拥有罕见的洞察力和坚定的理想主义。你能看到世界应该成为的样子，并以温和而不可动摇的决心推动改变。你对他人的情绪高度敏感，是很多人信赖的倾诉对象。你的座右铭是：温柔地改变世界。"},
  INFP:{n:"调停者",d:"你的内心世界丰富而深邃，由强烈的价值观和对真实的渴望驱动。你拥有敏锐的同理心和不受束缚的创造力，总是在寻找事物背后的深层意义。你看起来安静，内心却燃烧着理想主义的火焰。"},
  ENFJ:{n:"主人公",d:"你天生就是激励者，拥有将人凝聚在一起的神奇能力。你善于发现每个人的闪光点并帮助他们成长，在帮助他人实现潜能的过程中找到自己的价值。你的热情和真诚是无可替代的礼物。"},
  ENFP:{n:"竞选者",d:"你拥有感染力的热情和对生活的无限好奇。你总是在发现人和事之间的奇妙联系，用你的想象力和乐观主义点亮周围的每个人。你不怕尝试新方向，因为人生的可能性对你来说永无止境。"},
  ISTJ:{n:"物流师",d:"你是可靠与精确的化身。你以事实为依据、经验为指南，用脚踏实地的行动创造秩序。你不轻易承诺，但一旦承诺就会全力以赴。在这个充满变数的世界里，你是所有人都可以依靠的磐石。"},
  ISFJ:{n:"守卫者",d:"你温暖而坚定，是默默守护周围人的力量。你注重实际的关怀，在日常的细微之处表达爱意。你不喜欢成为焦点，但你的付出却让每个人的生活变得更美好。你是那种让人感到安心和温暖的存在。"},
  ESTJ:{n:"总经理",d:"你是卓越的组织者和执行者。你相信规则和秩序的力量，善于将混乱变成高效的系统。你直言不讳、行动力强，推动事情向前发展。你相信努力就会有回报，并用实际行动证明这一点。"},
  ESFJ:{n:"执政官",d:"你温暖慷慨，是社群的自然守护者。你在意每个人的感受，善于营造和谐的氛围。细心、尽责、富有同理心，你以实际行动关怀他人。在服务和连接中找到人生最深层的满足。"},
  ISTP:{n:"鉴赏家",d:"你冷静务实，是动手解决问题的专家。你喜欢理解事物运作的原理，在最简洁有效的方案中找到美感。你不喜欢过多的理论和说教，更相信实践出真知。你的冷静和分析能力在危机中尤其闪耀。"},
  ISFP:{n:"探险家",d:"你拥有敏锐的审美和温柔的内心。你活在当下，用五感体验世界，善于在平凡中发现美。你低调而真诚，以自己的步调探索生活，用独特的视角创造属于自己的风景。你不说太多，但你的作品和选择说明一切。"},
  ESTP:{n:"企业家",d:"你充满活力、思维敏锐，善于在瞬息万变中抓住机会。你不害怕冒险，因为行动本身就是最好的答案。你务实、直接、行动力强，在实践和体验中找到生活的真谛。你的座右铭是：坐而言不如起而行。"},
  ESFP:{n:"表演者",d:"你是天生的快乐传播者。你喜欢舞台和人群，总能发现日常中的惊喜和乐趣。你的热情和感染力让每个空间都变得明亮，你用真诚的笑容让生活本身成为最精彩的演出。你不担心别人的看法，只是尽情绽放。"},
};

var state = {qi:0,sc:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},photo:null,stream:null,flt:"none",touchX:0,cardX:0};

var $=function(id){return document.getElementById(id)};
var particles = [], mx=-200, my=-200;
var canvas = $("particles"), ctx = canvas.getContext("2d");

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener("resize",resize);

for(var i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*1.8+.3,sx:(Math.random()-.5)*.25,sy:(Math.random()-.5)*.25,o:Math.random()*.4+.08,ps:Math.random()*.015+.008,po:Math.random()*Math.PI*2})}

function animP(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var i=0;i<particles.length;i++){for(var j=i+1;j<particles.length;j++){var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle="rgba(140,140,220,"+(.05*(1-d/110))+")";ctx.lineWidth=.4;ctx.stroke()}}}
  for(var k=0;k<particles.length;k++){var p=particles[k],ddx=mx-p.x,ddy=my-p.y,dist=Math.sqrt(ddx*ddx+ddy*ddy);if(dist<180){p.x-=ddx*.0015;p.y-=ddy*.0015}p.x+=p.sx;p.y+=p.sy;if(p.x<-20)p.x=canvas.width+20;if(p.x>canvas.width+20)p.x=-20;if(p.y<-20)p.y=canvas.height+20;if(p.y>canvas.height+20)p.y=-20;p.co=p.o+Math.sin(t*p.ps+p.po)*.12;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fillStyle="rgba(160,160,240,"+Math.max(0,p.co)+")";ctx.fill()}
  requestAnimationFrame(animP)
}requestAnimationFrame(animP);
document.addEventListener("mousemove",function(e){mx=e.clientX;my=e.clientY});
document.addEventListener("touchmove",function(e){if(e.touches.length>0){mx=e.touches[0].clientX;my=e.touches[0].clientY}},{passive:true});

function swScreen(from,to,dir){
  var cls = dir==="up"?"hide-up":"hide-down";
  from.classList.add(cls);from.classList.remove("active");
  to.style.transform = dir==="up"?"translateY(60px)":"translateY(-60px)";
  to.classList.remove("hide-up","hide-down");to.classList.add("active");
  requestAnimationFrame(function(){to.style.transform="translateY(0)"});
  setTimeout(function(){from.classList.remove(cls)},500)
}

var toastTimer;
function showToast(msg){
  var t=$("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove("show")},2000)
}

function renderQ(){
  var q=Q[state.qi];
  $("qdim").textContent=q.dl;$("qtxt").textContent=q.t;
  $("qhint").textContent="";
  $("prog-txt").textContent=(state.qi+1)+"/30";
  var off=358.14-(358.14*(state.qi/30));
  $("prog-fg").style.strokeDashoffset=off;
  var oc=$("qopts");oc.innerHTML="";
  q.o.forEach(function(opt,i){
    var btn=document.createElement("button");btn.className="q-opt";
    btn.textContent=(i===0?"← ":"→ ")+opt.t;
    btn.addEventListener("click",function(){pick(i)});
    oc.appendChild(btn)
  });
  var card=$("qcard");card.style.transform="translateY(20px)";card.style.opacity="0";
  requestAnimationFrame(function(){card.style.transition="transform .4s cubic-bezier(.23,1,.32,1),opacity .3s ease";card.style.transform="translateY(0)";card.style.opacity="1"})
}

function pick(idx){
  var q=Q[state.qi];state.sc[q.o[idx].s]++;
  var opts=$("qopts").children;
  for(var i=0;i<opts.length;i++){opts[i].classList.remove("picked");opts[i].style.pointerEvents="none"}
  opts[idx].classList.add("picked");
  setTimeout(function(){
    if(state.qi<Q.length-1){state.qi++;renderQ()}
    else{swScreen($("question"),$("camera"),"up");startCam()}
  },350)
}

var si=0;
function startCam(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){showToast("摄像头不可用");return}
  navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:720},height:{ideal:960}},audio:false}).then(function(stream){
    state.stream=stream;$("cam-video").srcObject=stream;applyFlt(state.flt)
  }).catch(function(){showToast("无法访问摄像头")})
}
function stopCam(){if(state.stream){state.stream.getTracks().forEach(function(t){t.stop()});state.stream=null}}
function applyFlt(f){
  state.flt=f;var v=$("cam-video");
  switch(f){case"none":v.style.filter="none";break;case"vivid":v.style.filter="saturate(1.6) contrast(1.08)";break;case"mono":v.style.filter="grayscale(1) contrast(1.08)";break;case"warm":v.style.filter="sepia(.35) saturate(1.3)";break}
  document.querySelectorAll(".cam-filter").forEach(function(el){el.classList.toggle("active",el.dataset.flt===f)})
}
document.querySelectorAll(".cam-filter").forEach(function(b){b.addEventListener("click",function(){applyFlt(b.dataset.flt)})});

$("btn-cap").addEventListener("click",function(){
  var v=$("cam-video"),c=$("cam-canvas");
  c.width=v.videoWidth||720;c.height=v.videoHeight||960;var cx=c.getContext("2d");
  cx.save();cx.scale(-1,1);cx.drawImage(v,-c.width,0,c.width,c.height);cx.restore();
  if(state.flt==="vivid"){cx.fillStyle="rgba(99,102,241,.1)";cx.fillRect(0,0,c.width,c.height)}
  if(state.flt==="warm"){cx.fillStyle="rgba(255,180,120,.15)";cx.fillRect(0,0,c.width,c.height)}
  if(state.flt==="mono"){var id=cx.getImageData(0,0,c.width,c.height);for(var i=0;i<id.data.length;i+=4){var a=(id.data[i]+id.data[i+1]+id.data[i+2])/3;id.data[i]=a;id.data[i+1]=a;id.data[i+2]=a}cx.putImageData(id,0,0)}
  state.photo=c.toDataURL("image/jpeg",.9);showToast("照片已保存！");stopCam();setTimeout(showResult,500)
});
$("btn-skip").addEventListener("click",function(){stopCam();showResult()});

function calcType(){
  var s=state.sc;
  return (s.E>=s.I?"E":"I")+(s.S>=s.N?"S":"N")+(s.T>=s.F?"T":"F")+(s.J>=s.P?"J":"P")
}
function showResult(){
  var type=calcType(),td=TYPES[type]||{n:"探索者",d:"你是独一无二的自己，每一种特质都构成了完整的你。"};
  $("res-badge").textContent=type;$("res-name").textContent=td.n;$("res-desc").textContent=td.d;
  var pi=$("res-photo");
  if(state.photo){pi.src=state.photo;pi.style.display="block"}else{pi.style.display="none"}
  var dims=[
    {l:"E",r:"I",v:state.sc.E,t:state.sc.E+state.sc.I,c:"ei",ll:"外向E",rr:"内向I"},
    {l:"S",r:"N",v:state.sc.S,t:state.sc.S+state.sc.N,c:"sn",ll:"感觉S",rr:"直觉N"},
    {l:"T",r:"F",v:state.sc.T,t:state.sc.T+state.sc.F,c:"tf",ll:"思考T",rr:"情感F"},
    {l:"J",r:"P",v:state.sc.J,t:state.sc.J+state.sc.P,c:"jp",ll:"判断J",rr:"感知P"}
  ];
  var bc=$("res-bars");bc.innerHTML="";
  dims.forEach(function(d){
    var pct=Math.round((d.v/d.t)*100);
    var r=document.createElement("div");r.className="rbar-row";
    r.innerHTML='<span class="rbar-label" style="color:'+(pct>=50?"#e0e0f0":"#6a6a90")+'">'+d.l+'</span><div class="rbar-track"><div class="rbar-fill '+d.c+'" data-w="'+pct+'%" style="width:0%"></div></div><span class="rbar-label" style="color:'+(pct<50?"#e0e0f0":"#6a6a90")+'">'+d.r+'</span>';
    bc.appendChild(r)
  });
  swScreen($("camera"),$("result"),"up");
  setTimeout(function(){document.querySelectorAll(".rbar-fill").forEach(function(b){b.style.width=b.dataset.w})},600)
}

$("btn-start").addEventListener("click",function(){swScreen($("intro"),$("question"),"up");renderQ()});
$("btn-retry").addEventListener("click",function(){
  state={qi:0,sc:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},photo:null,stream:null,flt:"none",touchX:0,cardX:0};
  $("res-photo").style.display="none";swScreen($("result"),$("question"),"down");setTimeout(renderQ,300)
});
$("btn-share").addEventListener("click",function(){
  var type=calcType(),td=TYPES[type];
  var txt="🧠 我的 MBTI 人格类型是 "+type+"「"+td.n+"」！快来测测你的人格密码 →";
  if(navigator.share){navigator.share({title:"MBTI 人格测试",text:txt}).catch(function(){})}
  else{navigator.clipboard.writeText(txt).then(function(){showToast("已复制分享文案")}).catch(function(){showToast("分享失败，请截图保存")})}
});

// Gesture: swipe on question card
$("qcard").addEventListener("touchstart",function(e){state.touchX=e.touches[0].clientX;state.cardX=0;$("qcard").classList.add("swiping")});
$("qcard").addEventListener("touchmove",function(e){
  state.cardX=e.touches[0].clientX-state.touchX;$("qcard").style.transform="translateX("+state.cardX+"px)"
});
$("qcard").addEventListener("touchend",function(e){
  $("qcard").classList.remove("swiping");
  if(Math.abs(state.cardX)>80){
    if(state.cardX<0){var q=state.qi<Q.length-1?Q[state.qi]:null;if(q){state.sc[q.o[0].s]++;if(state.qi<Q.length-1){state.qi++;renderQ()}else{swScreen($("question"),$("camera"),"up");startCam()}}}
    else{var q2=state.qi<Q.length-1?Q[state.qi]:null;if(q2){state.sc[q2.o[1].s]++;if(state.qi<Q.length-1){state.qi++;renderQ()}else{swScreen($("question"),$("camera"),"up");startCam()}}}
  }else{$("qcard").style.transition="transform .3s cubic-bezier(.23,1,.32,1)";$("qcard").style.transform="translateX(0)"}
  state.cardX=0
});

// Gesture: pull down on result to retake
var resTouchY=0;
$("result").addEventListener("touchstart",function(e){resTouchY=e.touches[0].clientY});
$("result").addEventListener("touchend",function(e){
  if(e.changedTouches[0].clientY-resTouchY>120){
    state={qi:0,sc:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},photo:null,stream:null,flt:"none",touchX:0,cardX:0};
    $("res-photo").style.display="none";swScreen($("result"),$("question"),"down");setTimeout(renderQ,300)
  }
});

// Keyboard nav for dev
document.addEventListener("keydown",function(e){
  var qs=$("question");
  if(qs.classList.contains("active")){
    if(e.key==="ArrowLeft"||e.key==="a"){pick(0)}
    if(e.key==="ArrowRight"||e.key==="d"){pick(1)}
  }
});

console.log("🧠 MBTI Personality Test v2 — 30 questions, camera, gestures");
})();
</script>
</body>
